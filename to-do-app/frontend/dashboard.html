<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do App | Dashboard</title>
    <!-- Bootstrap CSS styles -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="./">
          <img src="./images/logo.svg" alt="logo" height="30px" width="auto" />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <img
            src="./images/Hamburger.svg"
            alt="hamburger icon"
            height="40px"
            width="auto"
          />
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="./features.html">Features</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./pricing.html">Pricing</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./support.html">Support</a>
            </li>
          </ul>
          <div class="d-flex align-items-center gap-3 ms-3">
            <button class="btn btn-outline-light" onclick="logout()">
              Log out
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Dashboard Section -->
    <main>
      <div class="bg-img dashboard py-5">
        <!-- Form Input Section -->
        <div
          class="d-flex justify-content-center flex-column align-items-center container"
        >
          <div class="rounded shadow bg-translucent p-3 p-lg-5 col-12">
            <form id="taskForm" class="mb-5 text-white">
              <h1 id="greeting" class="mb-5 display-3">Your Dashboard</h1>
              <h2 class="mb-3">New Task</h2>

              <input
                id="taskName"
                name="taskName"
                placeholder="Task Name"
                class="mb-2 form-control shadow-sm"
                type="text"
                required
              />

              <textarea
                placeholder="Task Description"
                id="taskDescription"
                name="taskDescription"
                rows="7"
                class="form-control mb-2 shadow-sm"
                required
              ></textarea>

              <input
                id="dueDate"
                name="dueDate"
                class="mb-3 form-control shadow-sm"
                type="date"
                required
              />
              <button type="submit" class="btn btn-primary shadow-sm px-5">
                Create Task
              </button>
            </form>

            <div class="d-flex align-items-center gap-3 mb-5">
              <label for="sortSelect" class="text-white">Sort by:</label>
              <select id="sortSelect" class="form-select w-auto shadow-none">
                <option value="default">Default</option>
                <option value="dueDate">Due Date</option>
                <option value="dateCreated">Date Created</option>
              </select>
            </div>

            <!-- Tasks -->
            <div class="row text-white">
              <div class="col-12 col-lg-6 mb-4 mb-lg-0">
                <h2>To Do</h2>
                <ul id="toDoList" class="list-group"></ul>
              </div>
              <div class="col-12 col-lg-6 mb-4 mb-lg-0">
                <h2>Completed</h2>
                <ul id="completedList" class="list-group"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer>
      <div class="py-5 container">
        <div
          class="d-flex justify-content-between flex-column gap-5 gap-md-0 flex-md-row align-items-center px-3 mb-5"
        >
          <a href="./">
            <img
              src="./images/logo.svg"
              alt="logo"
              height="50px"
              width="auto"
            />
          </a>
          <div class="col-12 col-sm-8 col-md-7 col-lg-5 col-xl-4">
            <h3 class="text-white mb-3 text-center text-md-start">
              Subscribe to our Newsletter
            </h3>
            <div class="input-group">
              <input
                placeholder="Enter your email"
                type="email"
                class="form-control"
              />
              <button class="btn btn-primary">Subscribe</button>
            </div>
          </div>
        </div>
        <div
          class="d-flex justify-content-center flex-column gap-3 flex-md-row align-items-center"
        >
          <a class="nav-link" href="#">Privacy Policy</a>
          <p class="m-0 d-none d-md-block">|</p>
          <a class="nav-link" href="#">Terms of Service</a>
          <p class="m-0 d-none d-md-block">|</p>
          <p class="m-0">To Do App &COPY; 2026 All Rights Reserved</p>
        </div>
      </div>
    </footer>

    <!-- JavaScript -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./js/api.js"></script>
  </body>
</html>
