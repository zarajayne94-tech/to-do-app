<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do App | Sign Up</title>
    <!-- Bootstrap CSS styles -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <!-- Navigation Menu -->
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="./">
          <img src="./images/logo.svg" alt="logo" height="30px" width="auto" />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <img
            src="./images/Hamburger.svg"
            alt="hamburger icon"
            height="40px"
            width="auto"
          />
        </button>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="./features.html">Features</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./pricing.html">Pricing</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./support.html">Support</a>
            </li>
          </ul>
          <div class="d-flex gap-2 d-none d-lg-block ms-3">
            <a class="btn btn-primary" href="./login.html">Login</a>
            <a class="btn btn-outline-light" href="./signup.html">Sign Up</a>
          </div>
        </div>
      </div>
    </nav>

    <section
      class="bg-img py-5 d-flex justify-content-center align-items-center min-vh-75"
    >
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-6 col-lg-5">
            <div class="bg-translucent p-4 p-lg-5">
              <h1 class="text-white mb-2">Create Account</h1>
              <p class="mb-4" style="color: var(--secondary-color)">
                Already have an account?
                <a href="./login.html" class="text-white">Log in</a>
              </p>

              <!-- Error / Success messages (hidden by default) -->
              <div id="errorMessage" class="alert alert-danger d-none"></div>
              <div id="successMessage" class="alert alert-success d-none"></div>

              <form id="signupForm">
                <div class="mb-3">
                  <label for="name" class="form-label text-white"
                    >Name</label
                  >
                  <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-control shadow-sm"
                    placeholder=""
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label text-white"
                    >Email Address</label
                  >
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control shadow-sm"
                    placeholder=""
                    required
                  />
                </div>
                <div class="mb-4">
                  <label for="password" class="form-label text-white"
                    >Password</label
                  >
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control shadow-sm"
                    placeholder=""
                    required
                  />
                </div>
                <button
                  type="submit"
                  id="submitBtn"
                  class="btn btn-primary w-100 shadow-sm"
                >
                  Create Account
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer>
      <div class="py-5 container">
        <div
          class="d-flex justify-content-between flex-column gap-5 gap-md-0 flex-md-row align-items-center px-3 mb-5"
        >
          <a href="./">
            <img
              src="./images/logo.svg"
              alt="logo"
              height="50px"
              width="auto"
            />
          </a>
          <div class="col-12 col-sm-8 col-md-7 col-lg-5 col-xl-4">
            <h3 class="text-white mb-3 text-center text-md-start">
              Subscribe to our Newsletter
            </h3>
            <div class="input-group">
              <input
                placeholder="Enter your email"
                type="email"
                class="form-control"
              />
              <button class="btn btn-primary">Subscribe</button>
            </div>
          </div>
        </div>
        <div
          class="d-flex justify-content-center flex-column gap-3 flex-md-row align-items-center"
        >
          <a class="nav-link" href="#">Privacy Policy</a>
          <p class="m-0 d-none d-md-block">|</p>
          <a class="nav-link" href="#">Terms of Service</a>
          <p class="m-0 d-none d-md-block">|</p>
          <p class="m-0">To Do App &COPY; 2026 All Rights Reserved</p>
        </div>
      </div>
    </footer>

    <!-- Authentication JS -->
    <script src="./js/auth.js"></script> 
    
    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
